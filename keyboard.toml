# Documentation: https://rmk.rs/docs/configuration.html
[keyboard]
name = "RMK MOKETA"
product_name = "MOKETA"
vendor_id = 0x0000
product_id = 0xFEED
manufacturer = "inpudiy"
chip = "nrf52840"

[matrix]
# Row and col pins are mandatory
row_pins = ["PIN_2", "PIN_21", "PIN_3", "PIN_20", "PIN_4", "PIN_19", "PIN_10"]
col_pins = ["PIN_5", "PIN_6", "PIN_7", "PIN_15", "PIN_14"]

# RMK uses col2row as the default matrix diode direction, if you want to use a row2col matrix, add `row2col = true`
# row2col = true

[layout]
rows = 4
cols = 12
layers = 4
keymap = [
    [
        ["[", "Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P", "]"],
        ["Kc1", "Kc2", "Kc3"],
        ["LCtrl", "MO(1)", "LShift"],
        ["OSL(1)", "LT(2, Kc9)", "LM(1, LShift | LGui)"]
    ],
    [
        ["_", "TT(1)", "TG(2)"],
        ["_", "_", "_"],
        ["_", "_", "_"],
        ["_", "_", "_"]
    ],
]
